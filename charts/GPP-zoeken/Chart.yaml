apiVersion: v2
name: gpp-zoeken
description: Een zoek-component die voorziet in een "Openbare documenten"-index.

type: application
version: 0.2.6-rc.4
appVersion: 2.2.0-rc.0

dependencies:
  - name: redis
    version: 22.0.1
    repository: https://charts.bitnami.com/bitnami
    tags:
      - redis
  - name: eck-operator
    version: 3.3.1
    repository: https://helm.elastic.co
    tags:
      - eck-operator
    condition: eck-operator.enabled
  - name: eck-elasticsearch
    version: 0.18.1
    repository: https://helm.elastic.co
    tags:
      - eck-elasticsearch
    condition: eck-elasticsearch.enabled
